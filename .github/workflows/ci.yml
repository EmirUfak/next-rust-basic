name: CI

on:
  push:
    branches:
      - master
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "public/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "next.config.ts"
      - "eslint.config.mjs"
      - "vitest.config.ts"
      - "playwright.config.ts"
      - "postcss.config.mjs"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "public/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "next.config.ts"
      - "eslint.config.mjs"
      - "vitest.config.ts"
      - "playwright.config.ts"
      - "postcss.config.mjs"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  app-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          SKIP_WASM_BUILD: "1"

      - name: Audit dependencies
        run: bun audit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
        env:
          SKIP_WASM_BUILD: "1"
